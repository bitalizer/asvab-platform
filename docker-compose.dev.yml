services:
  postgres:
    image: postgres:16-alpine
    container_name: mr-postgres
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: missionready
    ports:
      - '5432:5432'
    volumes:
      - mr-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dev -d missionready']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mr-redis
    ports:
      - '6379:6379'
    volumes:
      - mr-redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mr-pg-data:
  mr-redis-data:

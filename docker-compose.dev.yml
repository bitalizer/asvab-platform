services:
  postgres:
    image: postgres:16-alpine
    container_name: asvab-postgres
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: asvab
    ports:
      - '5432:5432'
    volumes:
      - asvab-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dev -d asvab']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: asvab-redis
    ports:
      - '6379:6379'
    volumes:
      - asvab-redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  asvab-pg-data:
  asvab-redis-data:

# Build and deploy config for the Python AI service.
# Railway should be configured with:
#   Root Directory: apps/ai
#   Watch Paths:    apps/ai/**
#   Config Path:    railway.toml  (relative to Root Directory)

[build]
builder = "NIXPACKS"
buildCommand = "uv sync --frozen"

[deploy]
startCommand = "uv run uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

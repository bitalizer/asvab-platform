packages:
  - "apps/*"
  - "packages/*"

# pnpm v10+ blocks lifecycle scripts by default for supply-chain safety.
# These packages legitimately need install-time native binaries:
#   - @biomejs/biome → linter/formatter native binary
#   - sharp          → Next.js image optimization (libvips bindings)
#   - unrs-resolver  → Rust-based module resolver used by ESLint config
# When adding a new dependency that needs to run install scripts, add it here.
allowBuilds:
  "@biomejs/biome": true
  sharp: true
  unrs-resolver: true
